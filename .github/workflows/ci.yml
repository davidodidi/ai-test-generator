name: CI — AI Test Generator
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  api-tests:
    name: API Tests (Open Library REST API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run API tests
        run: pytest tests/api/ -v --tb=short -m api

  e2e-tests:
    name: E2E Tests (Open Library UI — Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Install Playwright browser dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Run E2E tests (headless)
        run: pytest tests/e2e/ -v --tb=short -m e2e --browser chromium

  generate-tests:
    name: AI Test Generation (Groq LLaMA 3.3)
    runs-on: ubuntu-latest
    if: ${{ vars.GROQ_API_KEY_AVAILABLE == 'true' }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Generate tests via Groq
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python scripts/generate_tests.py
      - name: Run generated API tests
        run: pytest tests/api/ -v --tb=short
      - name: Install Playwright browser dependencies (Ubuntu 24.04 fix)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2t64 \
            libatk-bridge2.0-0 \
            libatk1.0-0 \
            libcups2 \
            libdbus-1-3 \
            libdrm2 \
            libgbm1 \
            libgtk-3-0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxkbcommon0 \
            libxrandr2 \
            xvfb
      - name: Install Playwright browsers
        run: playwright install chromium
      - name: Run generated E2E tests
        run: pytest tests/e2e/ -v --tb=short --browser chromium
